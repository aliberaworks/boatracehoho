name: Daily Boat Race Prediction
on:
  schedule:
    # 毎日 8:00 JST (23:00 UTC前日) に実行
    - cron: '0 23 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 30分でタイムアウト（2時間超え防止）
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily prediction
        run: python -c "from main import run_daily; run_daily()"

      - name: Check file sizes
        run: |
          echo "=== Data file sizes ==="
          ls -lh public/data/ || echo "No data files"
          
          # 90MB以上のファイルがあれば除外
          for f in public/data/*.json; do
            if [ -f "$f" ]; then
              size=$(stat -c%s "$f" 2>/dev/null || echo 0)
              size_mb=$((size / 1024 / 1024))
              echo "$f: ${size_mb}MB"
              if [ "$size_mb" -gt 90 ]; then
                echo "WARNING: $f is ${size_mb}MB (>90MB), removing to prevent push failure"
                rm "$f"
              fi
            fi
          done

      - name: Commit prediction data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # .gitignoreでデータは除外済みなので、-f で強制add
          git add -f public/data/*.json 2>/dev/null || true
          
          git diff --cached --quiet || git commit -m "Daily prediction: $(date +%Y%m%d)"
          git push || echo "Push failed, possibly due to file size"

  deploy:
    needs: predict
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./public
